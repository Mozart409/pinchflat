pg_replication:
  query: 'SELECT EXTRACT(EPOCH FROM (now() - pg_last_xact_replay_timestamp())) as lag'
  master: true
  metrics:
    - lag:
        usage: 'GAUGE'
        description: 'Replication lag in seconds'

pg_postmaster:
  query: 'SELECT pg_postmaster_start_time as start_time_seconds from pg_postmaster_start_time()'
  master: true
  metrics:
    - start_time_seconds:
        usage: 'GAUGE'
        description: 'Time at which postmaster started'

pg_stat_user_tables:
  query: |
    SELECT
      schemaname,
      relname,
      seq_scan,
      seq_tup_read,
      idx_scan,
      idx_tup_fetch,
      n_tup_ins,
      n_tup_upd,
      n_tup_del,
      n_tup_hot_upd,
      n_live_tup,
      n_dead_tup,
      n_mod_since_analyze,
      last_vacuum,
      last_autovacuum,
      last_analyze,
      last_autoanalyze,
      vacuum_count,
      autovacuum_count,
      analyze_count,
      autoanalyze_count
    FROM pg_stat_user_tables
  metrics:
    - schemaname:
        usage: 'LABEL'
        description: 'Name of the schema that this table is in'
    - relname:
        usage: 'LABEL'
        description: 'Name of the table'
    - seq_scan:
        usage: 'COUNTER'
        description: 'Number of sequential scans initiated on this table'
    - seq_tup_read:
        usage: 'COUNTER'
        description: 'Number of live rows fetched by sequential scans'
    - idx_scan:
        usage: 'COUNTER'
        description: 'Number of index scans initiated on this table'
    - idx_tup_fetch:
        usage: 'COUNTER'
        description: 'Number of live rows fetched by index scans'
    - n_tup_ins:
        usage: 'COUNTER'
        description: 'Number of rows inserted'
    - n_tup_upd:
        usage: 'COUNTER'
        description: 'Number of rows updated'
    - n_tup_del:
        usage: 'COUNTER'
        description: 'Number of rows deleted'
    - n_tup_hot_upd:
        usage: 'COUNTER'
        description: 'Number of rows HOT updated'
    - n_live_tup:
        usage: 'GAUGE'
        description: 'Estimated number of live rows'
    - n_dead_tup:
        usage: 'GAUGE'
        description: 'Estimated number of dead rows'
    - n_mod_since_analyze:
        usage: 'GAUGE'
        description: 'Estimated number of rows modified since this table was last analyzed'
    - last_vacuum:
        usage: 'GAUGE'
        description: 'Last time at which this table was manually vacuumed'
    - last_autovacuum:
        usage: 'GAUGE'
        description: 'Last time at which this table was vacuumed by the autovacuum daemon'
    - last_analyze:
        usage: 'GAUGE'
        description: 'Last time at which this table was manually analyzed'
    - last_autoanalyze:
        usage: 'GAUGE'
        description: 'Last time at which this table was analyzed by the autovacuum daemon'
    - vacuum_count:
        usage: 'COUNTER'
        description: 'Number of times this table has been manually vacuumed'
    - autovacuum_count:
        usage: 'COUNTER'
        description: 'Number of times this table has been vacuumed by the autovacuum daemon'
    - analyze_count:
        usage: 'COUNTER'
        description: 'Number of times this table has been manually analyzed'
    - autoanalyze_count:
        usage: 'COUNTER'
        description: 'Number of times this table has been analyzed by the autovacuum daemon'

pg_stat_statements:
  query: |
    SELECT
      pg_get_userbyid(userid) as user,
      pg_database.datname as database,
      pg_stat_statements.queryid as queryid,
      pg_stat_statements.query as query,
      calls,
      total_exec_time,
      mean_exec_time,
      stddev_exec_time,
      rows,
      shared_blks_hit,
      shared_blks_read,
      shared_blks_dirtied,
      shared_blks_written,
      local_blks_hit,
      local_blks_read,
      local_blks_dirtied,
      local_blks_written,
      temp_blks_read,
      temp_blks_written
    FROM pg_stat_statements
    JOIN pg_database ON pg_database.oid = pg_stat_statements.dbid
  master: true
  metrics:
    - user:
        usage: 'LABEL'
        description: 'User who executed the statement'
    - database:
        usage: 'LABEL'
        description: 'Database in which the statement was executed'
    - queryid:
        usage: 'LABEL'
        description: "Internal hash code, computed from the statement's parse tree"
    - query:
        usage: 'LABEL'
        description: 'Text of a representative statement'
    - calls:
        usage: 'COUNTER'
        description: 'Number of times executed'
    - total_exec_time:
        usage: 'COUNTER'
        description: 'Total time spent in the statement, in milliseconds'
    - mean_exec_time:
        usage: 'GAUGE'
        description: 'Mean time spent in the statement, in milliseconds'
    - stddev_exec_time:
        usage: 'GAUGE'
        description: 'Population standard deviation of time spent in the statement, in milliseconds'
    - rows:
        usage: 'COUNTER'
        description: 'Total number of rows retrieved or affected by the statement'
    - shared_blks_hit:
        usage: 'COUNTER'
        description: 'Total number of shared block cache hits by the statement'
    - shared_blks_read:
        usage: 'COUNTER'
        description: 'Total number of shared blocks read by the statement'
    - shared_blks_dirtied:
        usage: 'COUNTER'
        description: 'Total number of shared blocks dirtied by the statement'
    - shared_blks_written:
        usage: 'COUNTER'
        description: 'Total number of shared blocks written by the statement'
    - local_blks_hit:
        usage: 'COUNTER'
        description: 'Total number of local block cache hits by the statement'
    - local_blks_read:
        usage: 'COUNTER'
        description: 'Total number of local blocks read by the statement'
    - local_blks_dirtied:
        usage: 'COUNTER'
        description: 'Total number of local blocks dirtied by the statement'
    - local_blks_written:
        usage: 'COUNTER'
        description: 'Total number of local blocks written by the statement'
    - temp_blks_read:
        usage: 'COUNTER'
        description: 'Total number of temp blocks read by the statement'
    - temp_blks_written:
        usage: 'COUNTER'
        description: 'Total number of temp blocks written by the statement'
